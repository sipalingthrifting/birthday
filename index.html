<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9ecb, #ffc0cb);
  text-align: center;
}

/* tombol awal */
#startBtn {
  margin-top: 40vh;
  padding: 16px 28px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: #ff4da6;
  color: white;
}

/* container */
.canvas-wrap {
  width: 92%;
  max-width: 420px;
  margin: 10px auto;
}

canvas {
  width: 100%;
  border-radius: 20px;
}

/* pesan */
.message {
  font-size: 15px;
  padding: 15px;
  color: white;
}

/* 🎁 kado */
.gift-box {
  width: 110px;
  height: 110px;
  margin: 15px auto;
  background: #ff1a75;
  position: relative;
  border-radius: 12px;
  cursor: pointer;
}

.gift-box::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 18px;
  background: gold;
  top: 46px;
}

.gift-box::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 100%;
  background: gold;
  left: 46px;
}

.lid {
  width: 110px;
  height: 28px;
  background: #ff4da6;
  position: absolute;
  top: -28px;
  border-radius: 10px;
  transition: 0.4s;
}

.open .lid {
  transform: translateY(-60px) rotate(-25deg);
}

/* surprise */
.surprise {
  display: none;
  color: white;
  margin-top: 10px;
}

.open + .surprise {
  display: block;
}

/* FOTO */
.gallery img {
  width: 90%;
  max-width: 300px;
  border-radius: 15px;
  margin-top: 10px;
}

/* tombol WA */
#giftBtn {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: #25D366;
  color: white;
  font-size: 16px;
}

/* hidden */
.hidden {
  display: none;
}
</style>
</head>

<body>

<button id="startBtn">Hallo Sayangku 💖</button>

<div id="content" class="hidden">

  <div class="canvas-wrap">
    <canvas id="birthdayCanvas" class="hidden"></canvas>
  </div>

  <div class="gift-box" id="gift">
    <div class="lid"></div>
  </div>

  <div class="surprise">
    🎉 Aku sayang ndut, SHELLY APRILIANI SURBAKTI 💖
  </div>

  <!-- FOTO -->
  <div class="gallery hidden" id="gallery">
    <img id="photo" src="https://i.ibb.co/60hk0tTJ/S-18358291.jpg">
  </div>

  <!-- TOMBOL -->
  <button id="giftBtn" class="hidden">
    Mau hadiah apa 💖
  </button>

  <div class="message">
    Selamat ulang tahun 💖<br>
    Panjang Umur Sehat Selalu Sayang ❤️
  </div>

</div>

<script>
const btn = document.getElementById('startBtn');
const content = document.getElementById('content');
const gift = document.getElementById('gift');
const canvas = document.getElementById('birthdayCanvas');
const ctx = canvas.getContext('2d');

const gallery = document.getElementById('gallery');
const photo = document.getElementById('photo');
const giftBtn = document.getElementById('giftBtn');

let started = false;

/* start */
btn.onclick = () => {
  btn.style.display = 'none';
  content.classList.remove('hidden');
};

/* canvas */
function resizeCanvas() {
  const w = canvas.offsetWidth;
  canvas.width = w;
  canvas.height = w * 0.5;
}

/* gambar kue */
function drawCake() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const w = canvas.width;
  const h = canvas.height;

  ctx.fillStyle = '#ff66b2';
  ctx.fillRect(w*0.2, h*0.5, w*0.6, h*0.3);

  ctx.fillStyle = '#fff';
  ctx.fillRect(w*0.2, h*0.4, w*0.6, h*0.1);

  for(let i=0;i<5;i++){
    let x = w*0.25 + i*(w*0.1);

    ctx.fillStyle = 'yellow';
    ctx.fillRect(x, h*0.25, 5, 20);

    ctx.beginPath();
    ctx.fillStyle = 'orange';
    ctx.arc(x+2, h*0.23, 4, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial';
  ctx.fillText('Happy Birthday 💖', w*0.25, h*0.9);

  requestAnimationFrame(drawCake);
}

/* slideshow */
const images = [
  "https://i.ibb.co/60hk0tTJ/S-18358291.jpg",
  "https://i.ibb.co/GvpQ8c3p/S-18358288.jpg",
  "https://i.ibb.co/H9zDRKq/S-18358281.jpg",
  "https://i.ibb.co/KxG7nrLB/S-18358289.jpg"
];

let index = 0;

function startSlide() {
  setInterval(() => {
    index = (index + 1) % images.length;
    photo.src = images[index];
  }, 2000);
}

/* klik kado */
gift.onclick = () => {
  gift.classList.toggle('open');

  if (!started) {
    canvas.classList.remove('hidden');
    gallery.classList.remove('hidden');
    giftBtn.classList.remove('hidden');

    resizeCanvas();
    drawCake();
    startSlide();

    started = true;
  }
};

/* tombol WA */
giftBtn.onclick = () => {
  window.location.href = "https://wa.link/8y3x2g";
};
</script>

</body>
</html>
