<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9ecb, #ffc0cb);
  overflow: hidden;
  text-align: center;
}

/* tombol awal */
#startBtn {
  margin-top: 40vh;
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: #ff4da6;
  color: white;
}

/* container */
.canvas-wrap {
  width: 90%;
  max-width: 400px;
  margin: auto;
}

canvas {
  width: 100%;
  height: auto;
  border-radius: 20px;
}

/* pesan */
.message {
  font-size: 16px;
  padding: 15px;
  color: white;
}

/* 🎁 kado */
.gift-box {
  width: 120px;
  height: 120px;
  margin: 20px auto;
  background: #ff1a75;
  position: relative;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.5s;
}

.gift-box::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 20px;
  background: gold;
  top: 50px;
}

.gift-box::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 100%;
  background: gold;
  left: 50px;
}

/* tutup kado */
.lid {
  width: 120px;
  height: 30px;
  background: #ff4da6;
  position: absolute;
  top: -30px;
  border-radius: 10px;
  transition: 0.5s;
}

/* animasi buka */
.open .lid {
  transform: translateY(-60px) rotate(-20deg);
}

.surprise {
  display: none;
  font-size: 18px;
  color: white;
  margin-top: 10px;
}

.open + .surprise {
  display: block;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<button id="startBtn">Welcome Sayangku 💖</button>

<div id="content" class="hidden">

  <div class="canvas-wrap">
    <canvas id="birthdayCanvas"></canvas>
  </div>

  <!-- 🎁 KADO -->
  <div class="gift-box" id="gift">
    <div class="lid"></div>
  </div>

  <div class="surprise">
    🎉 Aku sayang kamu, SHELLY APRILIANI SRUBAKTI 💖<br>
    Semoga semua impian kamu tercapai ✨
  </div>

  <div class="message">
    Selamat ulang tahun, <b>SHELLY APRILIANI SRUBAKTI</b> 💖<br><br>
    Terima kasih sudah hadir di hidup aku ❤️
  </div>

</div>

<script>
const btn = document.getElementById('startBtn');
const content = document.getElementById('content');

btn.onclick = () => {
  btn.style.display = 'none';
  content.classList.remove('hidden');
};

/* 🎁 buka kado */
const gift = document.getElementById('gift');
gift.onclick = () => {
  gift.classList.toggle('open');
};

/* 🎂 canvas responsive */
const canvas = document.getElementById('birthdayCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.width * 0.5;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawCake() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#ff66b2';
  ctx.fillRect(canvas.width*0.2, canvas.height*0.5, canvas.width*0.6, canvas.height*0.3);

  ctx.fillStyle = '#fff';
  ctx.fillRect(canvas.width*0.2, canvas.height*0.4, canvas.width*0.6, canvas.height*0.1);

  for(let i=0;i<5;i++){
    let x = canvas.width*0.25 + i*(canvas.width*0.1);

    ctx.fillStyle = '#ffff66';
    ctx.fillRect(x, canvas.height*0.25, 8, 25);

    ctx.beginPath();
    ctx.fillStyle = Math.random() > 0.5 ? 'orange' : 'yellow';
    ctx.arc(x+4, canvas.height*0.23, 5, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = '16px Arial';
  ctx.fillText('Happy Birthday 💖', canvas.width*0.25, canvas.height*0.9);
}

setInterval(drawCake, 300);
</script>

</body>
</html>
